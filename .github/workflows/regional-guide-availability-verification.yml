name: Regional Guide Availability Verification

on:
  workflow_dispatch:

  schedule:
    - cron: '0 0 * * 0'

  pull_request:
    branches:
      - develop
      - main
    paths:
      - '.github/workflows/regional-guide-availability-verification.yml'
      - 'data/src/main/assets/region/regional_guide_availability.*.json'
      - 'data/src/main/java/**/RegionalGuideApiService.kt'
      - 'data/src/main/java/**/RegionalGuideResponseDto.kt'
      - 'data/src/test/java/**/RegionalGuideAvailabilityApiContractTest.kt'

permissions:
  contents: read

concurrency:
  group: regional-guide-availability-verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Regional Guide Availability
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    env:
      PUBLIC_DATA_SERVICE_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check public data service key
        run: |
          if [[ -z "$PUBLIC_DATA_SERVICE_KEY" ]]; then
            echo "PUBLIC_DATA_SERVICE_KEY GitHub Secret이 필요합니다." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "NAVER_CLIENT_ID=ci_dummy_naver_client_id" >> local.properties
          echo "PUBLIC_DATA_SERVICE_KEY=$PUBLIC_DATA_SERVICE_KEY" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Verify asset against /info API
        env:
          REGIONAL_GUIDE_AVAILABILITY_VERIFICATION: 'true'
        run: |
          ./gradlew :data:testDebugUnitTest \
            --tests com.team.yeogibeoryeo.data.regionalguide.availability.RegionalGuideAvailabilityApiContractTest \
            --no-daemon \
            --stacktrace

      - name: Print verification summary
        if: always()
        run: cat "$GITHUB_STEP_SUMMARY"
