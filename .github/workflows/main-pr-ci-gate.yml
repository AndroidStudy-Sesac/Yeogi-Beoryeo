name: Main Pull Request CI Gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-main-pull-request:
    name: Verify Main Pull Request CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.0.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.0.0

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "NAVER_CLIENT_ID=ci_dummy_naver_client_id" >> local.properties
          echo "PUBLIC_DATA_SERVICE_KEY=ci_dummy_public_data_service_key" >> local.properties

      - name: Verify data module unit tests
        run: |
          chmod +x ./gradlew
          ./gradlew :data:testDebugUnitTest --no-daemon
