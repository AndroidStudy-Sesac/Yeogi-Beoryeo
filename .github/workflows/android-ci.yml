name: Android CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - '.github/workflows/android-ci.yml'
      - 'app/**'
      - 'common/**'
      - 'data/**'
      - 'domain/**'
      - 'presentation/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'

  push:
    branches:
      - develop
      - main
    paths:
      - '.github/workflows/android-ci.yml'
      - 'app/**'
      - 'common/**'
      - 'data/**'
      - 'domain/**'
      - 'presentation/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android Project
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' || (github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/main') }}

      - name: Create local.properties for CI
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "NAVER_CLIENT_ID=ci_dummy_naver_client_id" >> local.properties
          echo "PUBLIC_DATA_SERVICE_KEY=ci_dummy_public_data_service_key" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Determine Gradle tasks
        id: gradle-tasks
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES="$(git ls-tree -r --name-only "$HEAD_SHA")"
          else
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          full_test=false
          common_changed=false
          domain_changed=false
          data_changed=false
          presentation_changed=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              .github/workflows/*|gradle/*|*gradle.kts|settings.gradle.kts|gradle.properties|gradle/libs.versions.toml)
                full_test=true
                ;;
              common/*)
                common_changed=true
                ;;
              domain/*)
                domain_changed=true
                ;;
              data/*)
                data_changed=true
                ;;
              presentation/*)
                presentation_changed=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          tasks=(":app:assembleDebug")

          if [[ "$full_test" == "true" ]]; then
            tasks=(
              ":common:testDebugUnitTest"
              ":data:testDebugUnitTest"
              ":presentation:testDebugUnitTest"
              ":domain:test"
              ":app:assembleDebug"
            )
          else
            if [[ "$common_changed" == "true" ]]; then
              tasks+=(":common:testDebugUnitTest" ":presentation:testDebugUnitTest")
            fi

            if [[ "$domain_changed" == "true" ]]; then
              tasks+=(":domain:test" ":data:testDebugUnitTest" ":presentation:testDebugUnitTest")
            fi

            if [[ "$data_changed" == "true" ]]; then
              tasks+=(":data:testDebugUnitTest")
            fi

            if [[ "$presentation_changed" == "true" ]]; then
              tasks+=(":presentation:testDebugUnitTest")
            fi
          fi

          unique_tasks=()
          for task in "${tasks[@]}"; do
            if [[ ! " ${unique_tasks[*]} " =~ " ${task} " ]]; then
              unique_tasks+=("$task")
            fi
          done

          selected_tasks="${unique_tasks[*]}"
          echo "tasks=$selected_tasks" >> "$GITHUB_OUTPUT"
          echo "Selected Gradle tasks: $selected_tasks"

      - name: Run selected unit tests and build debug APK
        run: ./gradlew ${{ steps.gradle-tasks.outputs.tasks }} --no-daemon --stacktrace
