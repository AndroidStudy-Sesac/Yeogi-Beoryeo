name: Android CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - '.github/workflows/android-ci.yml'
      - 'app/**'
      - 'common/**'
      - 'data/**'
      - 'domain/**'
      - 'presentation/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'

  push:
    branches:
      - develop
      - main
    paths:
      - '.github/workflows/android-ci.yml'
      - 'app/**'
      - 'common/**'
      - 'data/**'
      - 'domain/**'
      - 'presentation/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android Project
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create local.properties for CI
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "NAVER_CLIENT_ID=ci_dummy_naver_client_id" >> local.properties
          echo "PUBLIC_DATA_SERVICE_KEY=ci_dummy_public_data_service_key" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests and build debug APK
        run: ./gradlew :common:testDebugUnitTest :data:testDebugUnitTest :presentation:testDebugUnitTest :domain:test :app:assembleDebug --no-daemon --stacktrace
